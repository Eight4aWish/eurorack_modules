[platformio]
default_envs = pico2w_oc
src_dir = src

[env]
lib_extra_dirs = libs
monitor_speed = 115200
build_flags =
  -O2
  -fno-rtti
  -fno-exceptions
; extra_scripts = scripts/copy_artifacts.py

; Daisy Seed (DaisyDuino)
[env:daisy-mfx]
platform      = ststm32
board         = electrosmith_daisy
framework     = arduino
lib_deps      =
  https://github.com/electro-smith/DaisyDuino.git#v1.7.0
  adafruit/Adafruit SSD1306@^2.5.15
  adafruit/Adafruit GFX Library@^1.12.3
build_src_filter = -<*> +<daisy-mfx/>

build_flags   =
  ${env.build_flags}
  -DPLATFORM_DAISY
  -Iinclude/daisy-mfx
  -DHAL_SDRAM_MODULE_ENABLED
  -DUSE_FMC
  ; Optional cosmetic USB strings (safe):
  -DUSB_PRODUCT="\"DaisyMFX\""
  -DUSB_MANUFACTURER="\"Daisy\""

board_build.usb_mode = CDC
upload_protocol = dfu
upload_command  = dfu-util -a 0 -s 0x08000000:leave -D $PROJECT_BUILD_DIR/$PIOENV/firmware.bin || true
monitor_speed   = 115200

; Teensy 4.1
[env:teensy41]
platform     = teensy @ ~5.1.0
board        = teensy41
framework    = arduino
lib_deps     =
  adafruit/Adafruit SSD1306@^2.5.15
  adafruit/Adafruit GFX Library@^1.12.3
build_src_filter = -<*> +<teensy-move/>
build_flags  =
  ${env.build_flags}
  -DPLATFORM_TEENSY
  -Iinclude/teensy-move
  -D USB_MIDI_AUDIO_SERIAL
  -DUSE_STATIC_CALIB
upload_protocol = teensy-cli

; Teensy 4.1 V2 — Optimized MIDI timing
[env:teensy41_v2]
platform     = teensy @ ~5.1.0
board        = teensy41
framework    = arduino
lib_deps     =
  adafruit/Adafruit SSD1306@^2.5.15
  adafruit/Adafruit GFX Library@^1.12.3
build_src_filter = -<*> +<teensy-move-v2/>
build_flags  =
  ${env.build_flags}
  -DPLATFORM_TEENSY
  -Iinclude/teensy-move-v2
  -D USB_MIDI_SERIAL
  -DUSE_STATIC_CALIB
upload_protocol = teensy-cli

; Pico 2 W
[env:pico2w_oc]
platform      = https://github.com/maxgerhardt/platform-raspberrypi.git
board         = rpipico2w
framework     = arduino
lib_deps      =
  adafruit/Adafruit SSD1306 @ ^2.5.15
  adafruit/Adafruit GFX Library @ ^1.12.3
  adafruit/Adafruit MCP4728 @ ^1.0.10
  adafruit/Adafruit ADS1X15 @ ^2.6.0
  thomasfredericks/Bounce2 @ ^2.72
  fortyseveneffects/MIDI Library @ ^5.0.2
build_src_filter = -<*> +<pico2w_oc/>
build_flags   =
  ${env.build_flags}
  -DPLATFORM_PICO
  -Iinclude/pico2w_oc
  -DUSE_STATIC_CALIB
  -DUSE_TINYUSB
upload_protocol = picotool

; Pico 2 W Calibration CLI (removed; use OLED Diagnostics + static fits)


; ESP32 Dev Module
[env:esp32dev]
platform = espressif32 @ 6.12.0
board = esp32dev
framework = arduino
monitor_speed = 115200

build_src_filter = -<*> +<esp32oscclk/>
build_flags   =
  ${env.build_flags}
  -DPLATFORM_ESP32
  -Iinclude/esp32oscclk

lib_ldf_mode = chain
lib_compat_mode = soft

lib_deps =
  adafruit/Adafruit MCP4728@^1.0.10

; keep anything web-related out
lib_ignore = ESPAsyncWebServer AsyncTCP ElegantOTA AsyncElegantOTA RPAsyncTCP

; Teensy 4.1 — Chaos / fractal synthesis
[env:teensy-chaos]
platform     = teensy @ ~5.1.0
board        = teensy41
framework    = arduino
lib_deps     =
  adafruit/Adafruit SSD1306@^2.5.15
  adafruit/Adafruit GFX Library@^1.12.3
build_src_filter = -<*> +<teensy-chaos/>
build_flags  =
  ${env.build_flags}
  -DPLATFORM_TEENSY
  -Iinclude/teensy-chaos
  -D USB_AUDIO_SERIAL
upload_protocol = teensy-cli

; AI Module (CortHex) — Arduino Nano ESP32
[env:nanoesp32-corthex]
platform        = espressif32 @ 6.12.0
board           = arduino_nano_esp32
framework       = arduino
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder
build_src_filter = -<*> +<nanoesp32-corthex/>
; Embed static web-page assets directly into the firmware instead of using
; LittleFS. Avoids partition-table issues and means a single OTA upload
; ships HTML/CSS/JS along with the C++. Files in data/ are accessible at
; link time via _binary_*_start / _binary_*_end symbols.
board_build.embed_txtfiles =
  src/nanoesp32-corthex/data/index.html
  src/nanoesp32-corthex/data/style.css
  src/nanoesp32-corthex/data/app.js
  src/nanoesp32-corthex/data/plaits.html
  src/nanoesp32-corthex/data/plaits.js
  src/nanoesp32-corthex/data/llm.html
  src/nanoesp32-corthex/data/llm.js
; ESPAsyncWebServer / AsyncTCP rely on RTTI + exceptions internally; the
; project-level build_flags disable both. Undo that for this env only.
build_unflags   =
  -fno-rtti
  -fno-exceptions
build_flags     =
  ${env.build_flags}
  -DPLATFORM_AI_MODULE
  -DASYNCWEBSERVER_REGEX
lib_deps        =
  esp32async/ESPAsyncWebServer @ ^3.6.0
  esp32async/AsyncTCP @ ^3.2.10
  bblanchon/ArduinoJson @ ^7.0.0
upload_protocol = dfu
; The espressif32 platform's default dfu-util invocation only filters by
; vendor:product ID (2341:0070), which is ambiguous when other Arduino-DFU
; devices (e.g. Ksoloti) are connected. Post-script injects a serial filter.
extra_scripts   = post:scripts/nanoesp32_corthex_upload.py

; AI Module (CortHex) — OTA upload variant (uses ArduinoOTA over WiFi)
;
; Use after the module has been flashed once via DFU and is running on the
; LAN. Pulls the OTA password from the AI_MODULE_OTA_PASS env var so it
; doesn't need to be committed:
;
;   export AI_MODULE_OTA_PASS=your-ota-password
;   pio run -e nanoesp32-corthex-ota -t upload
;
; mDNS hostname must match OTA_HOST in src/nanoesp32-corthex/secrets.h.
[env:nanoesp32-corthex-ota]
extends         = env:nanoesp32-corthex
upload_protocol = espota
upload_port     = CortHex-ESP32.local
upload_flags    =
  --auth=${sysenv.AI_MODULE_OTA_PASS}
  --port=3232
extra_scripts   =

; Ksoloti Big Genes — Elements port (STM32F429 + ADAU1961)
[env:ksoloti-elements]
platform        = ststm32
board           = disco_f429zi
framework       = stm32cube
build_src_filter = -<*> +<ksoloti-elements/>
extra_scripts   = pre:scripts/elements_build.py
build_unflags   = -Os
build_flags     =
  ${env.build_flags}
  -DSTM32F429xx
  -DUSE_HAL_DRIVER
  -DHSE_VALUE=8000000U
  -DSAMPLERATE=32000
  -DBUFSIZE=16
  -DDOUBLE_BUFSIZE=32
  -Isrc/ksoloti-elements
  -Ithird_party/eurorack
upload_protocol = dfu
upload_command  = dfu-util -d 0483:df11 -S 305D355B3233 -a 0 -s 0x08000000:leave -D $PROJECT_BUILD_DIR/$PIOENV/firmware.bin

